plugins {
    id 'java'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}
javafx {
    version = "25.0.1"
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}
group = 'uk.ac.bucks.willralph'
version = '0.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    compileOnly fileTree(dir: 'libs', include: ['*.jar'])
    // Source: https://mvnrepository.com/artifact/org.openjfx/javafx-controls
    // implementation 'org.openjfx:javafx-controls:25.0.1'
    // Source: https://mvnrepository.com/artifact/org.openjfx/javafx-fxml
    // implementation 'org.openjfx:javafx-fxml:25.0.1'
}
jar {
    manifest {
        attributes(
                'Main-Class':'uk.ac.bucks.willralph.App'
        )
    }
}

test {
    useJUnitPlatform()
}